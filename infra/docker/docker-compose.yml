# Davo-AI · Local development stack
# Запуск: docker-compose -f infra/docker/docker-compose.yml up -d

services:
  # ─── PostgreSQL ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: davoai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: davoai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme-set-in-env}
      POSTGRES_DB: davoai
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../../data/synthetic/seed_patients.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U davoai"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Local Telegram Bot API ────────────────────────────
  # Снимает 20 MB лимит на скачивание видео (до 2 GB).
  # Нужен api_id + api_hash от https://my.telegram.org
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: davoai-telegram-api
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: 1
    ports:
      - "8081:8081"
    volumes:
      - telegram-bot-data:/var/lib/telegram-bot-api

  # ─── Ollama (для dev/тестов на Mac M4) ─────────────────
  # На production это запускается на RTX 5090 (vast.ai)
  ollama:
    image: ollama/ollama:latest
    container_name: davoai-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ─── pgAdmin (для отладки) ─────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: davoai-pgadmin
    profiles: ["debug"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-changeme-set-in-env}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  telegram-bot-data:
  ollama-data:
