# Davo-AI · pre-commit hooks
# Установка:  pip install pre-commit && pre-commit install
# Тест:       pre-commit run --all-files

repos:
  # ─── Hygiene ──────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=2000"]
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ─── Secret detection ─────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks · scan staged files for secrets

  # ─── Python · ruff (linter + formatter) ──────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
        files: \.py$
      - id: ruff-format
        files: \.py$

  # ─── Python · type-check (manual / CI) ───────────────────────
  # Запуск:  pre-commit run pyright --all-files --hook-stage manual
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.396
    hooks:
      - id: pyright
        stages: [manual]
        files: ^packages/(bot|inference)/.*\.py$
        additional_dependencies:
          - aiogram>=3.13.0
          - pydantic>=2.9.0
          - pydantic-settings>=2.5.0
          - sqlalchemy>=2.0.0
          - httpx>=0.27.0
          - fastapi>=0.115.0

  # ─── Local hooks ─────────────────────────────────────────────
  - repo: local
    hooks:
      # TypeScript typecheck (manual / CI — требует pnpm + node_modules)
      - id: tsc-dashboard
        name: tsc · typecheck dashboard
        language: system
        stages: [manual]
        entry: bash -c 'cd packages/dashboard && pnpm typecheck'
        files: ^packages/dashboard/.*\.(ts|tsx)$
        pass_filenames: false
        require_serial: true

      # Ban hardcoded credential patterns we already had once
      - id: check-no-hardcoded-creds
        name: forbid hardcoded email + password patterns
        language: pygrep
        entry: '(?i)(password|pwd|secret|api[_-]?key|token)\s*[:=]\s*["''][a-zA-Z0-9_\-]{4,}["'']'
        files: \.(yml|yaml|py|ts|tsx|js|json|sql|env)$
        exclude: '(\.env\.example|tests/fixtures/|locales/.*\.json)$'
