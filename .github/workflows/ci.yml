name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: pre-commit (lint, format, secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  bot-tests:
    name: Bot · pytest
    runs-on: ubuntu-latest
    needs: pre-commit
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: davoai
          POSTGRES_PASSWORD: ci-test-password
          POSTGRES_DB: davoai_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U davoai"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://davoai:ci-test-password@localhost:5432/davoai_test
      TELEGRAM_BOT_TOKEN: "0:test-token-not-real"
      LLM_API_URL: http://localhost:8001/v1
      LLM_MODEL: aya-expanse-32b
      VISION_API_URL: http://localhost:8002/v1
      WHISPER_API_URL: http://localhost:8003
      VERIFIER_API_URL: http://localhost:8005
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/bot/requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx
      - name: Apply DB schema
        env:
          PGPASSWORD: ci-test-password
        run: psql -h localhost -U davoai -d davoai_test -f infra/db/schema.sql
      - name: Run pytest
        working-directory: packages/bot
        run: pytest --cov=. --cov-report=xml --cov-report=term-missing -v
        continue-on-error: true

  type-check:
    name: Pyright type-check
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          pip install pre-commit
          pip install -r packages/bot/requirements.txt
          pip install -r packages/inference/requirements.txt || true
      - name: Run pyright (manual stage)
        run: pre-commit run pyright --all-files --hook-stage manual
        continue-on-error: true

  dashboard-build:
    name: Dashboard · build
    runs-on: ubuntu-latest
    needs: pre-commit
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: packages/dashboard/pnpm-lock.yaml
      - name: Install
        working-directory: packages/dashboard
        run: pnpm install --no-frozen-lockfile
      - name: Typecheck
        working-directory: packages/dashboard
        run: pnpm typecheck
        continue-on-error: true
      - name: Build
        working-directory: packages/dashboard
        run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: dashboard-build
          path: packages/dashboard/.next/
          retention-days: 7

  synthetic-data:
    name: Synthetic data · sanity
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install numpy
      - name: Generate cohort
        run: |
          python scripts/generate_synthetic.py --patients 10 --days 30 --output /tmp/synth-test
          test -f /tmp/synth-test/cohort.json
          test -f /tmp/synth-test/cohort_features.csv
          test -f /tmp/synth-test/seed_patients.sql

  shell-lint:
    name: Shell · shellcheck
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: shellcheck -S warning infra/dgx/setup_dgx_spark.sh
        continue-on-error: true
